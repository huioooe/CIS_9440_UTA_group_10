version: 2

models:
  - name: fact_property_transaction
    description: "Fact table for NYC property sales transactions"
    columns:
      - name: transaction_id
        description: "Surrogate key generated from bbl and sale_date"
        tests:
          - unique
          - not_null
      - name: sale_price
        tests:
          - not_null
      - name: sale_date
        tests:
          - not_null
      - name: location_id
        tests:
          - not_null
      - name: property_type_id
        tests:
          - not_null